networks:
    default:
        name: '${DOCKER_NAME}-network'
        driver: bridge

services:
    pgsql:
        container_name: '${DOCKER_NAME}-pgsql'
        build:
            context: ./docker/database
            dockerfile: dockerfile
        restart: unless-stopped
        ports:
            - '${DOCKER_DB_HOST_PORT}:5432'
        environment:
            DATABASE_HOST: '127.0.0.1'
            PGPASSWORD: '${DB_PASSWORD:-secret}'
            POSTGRES_DB: '${DB_DATABASE}'
            POSTGRES_USER: '${DB_USERNAME}'
            POSTGRES_PASSWORD: '${DB_PASSWORD:-secret}'
        volumes:
            - './docker/database/pgsql:/var/lib/postgresql/data'
            - './docker/database/init:/docker-entrypoint-initdb.d'
            - './docker/database/volume:/volume'
        healthcheck:
            test:
                - CMD
                - pg_isready
                - '-q'
                - '-d'
                - '${DB_DATABASE}'
                - '-U'
                - '${DB_USERNAME}'
            retries: 3
            timeout: 5s
        networks:
            - default

    app:
        container_name: '${DOCKER_NAME}-app'
        build:
            context: ./
            dockerfile: docker/dockerfile
            args:
                WWWGROUP: '${DOCKER_GID}'
                TIMEZONE: '${DOCKER_TIMEZONE}'
        restart: unless-stopped
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        environment:
            WWWUSER: '${DOCKER_UID}'
            XDEBUG_MODE: '${SAIL_XDEBUG_MODE:-off}'
            XDEBUG_CONFIG: '${SAIL_XDEBUG_CONFIG:-client_host=host.docker.internal}'
            IGNITION_LOCAL_SITES_PATH: '${PWD}'
        ports:
            - '${DOCKER_APP_HOST_PORT}:80'
            - '${VITE_PORT}:${VITE_PORT}'
        expose:
            - '389' # LDAP
        volumes:
            - ./:/var/www
            - ./docker/apache.conf:/etc/apache2/sites-available/000-default.conf
            - ./docker/php.ini:/etc/php/8.3/apache2/php.ini
            - ./docker/supervisord.conf:/etc/supervisor/conf.d/supervisord.conf
            - ./docker/cronfile:/my-utils/cronfile
        depends_on:
            - pgsql
        networks:
            - default
